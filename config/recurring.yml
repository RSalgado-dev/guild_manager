production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  sync_discord_guild_roles:
    class: DiscordGuildRolesSyncJob
    schedule: every 15 minutes
  sync_discord_members:
    class: DiscordMembersSyncJob
    schedule: every 10 minutes
  reconcile_discord_managed_roles:
    class: DiscordManagedRoleReconciliationJob
    schedule: every 30 minutes at minute 7
